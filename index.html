<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam‑Safe Python IDE</title>

<style>
:root {
  --bg:#1e1e1e;
  --panel:#2d2d2d;
  --accent:#007acc;
  --txt:#eaeaea;
  --out:#00ff99;
}

html, body {
  height:100%;
  margin:0;
  font-family: "Roboto", Arial, sans-serif;
  background: var(--bg);
  overflow:hidden;
  color: var(--txt);
}

#topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 14px;
  background:var(--panel);
  border-radius:4px;
  font-size:15px;
}

#container {
  display:grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 48px);
  gap: 4px;
}

#editor {
  grid-column: 1 / 2;
  grid-row: 1 / 3;
  width:100%;
  height:100%;
}

#rightPane {
  grid-column: 2 / 3;
  grid-row: 1 / 2;
  display:flex;
  flex-direction: column;
  gap: 4px;
}

#buttons {
  display:flex;
  justify-content:flex-end;
  gap: 6px;
  padding:4px;
}

#console {
  background:#0c0c0c;
  color: var(--out);
  font-family: monospace;
  padding:8px;
  height:200px;
  overflow:auto;
  white-space: pre-wrap;
  display:flex;
  flex-direction: column;
}

#consoleOutput {
  flex:1;
  overflow:auto;
}

#consoleInput {
  background:#111;
  color: var(--out);
  border:none;
  padding:4px;
  font-family: monospace;
}

#questionPane {
  grid-column:2 / 3;
  grid-row:2 / 3;
  background:#0d0d0d;
  border-top:1px solid #333;
  overflow:hidden;
}

#questionPane iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="topbar">
  <div>
    <strong>Exam IDE</strong>
    <label>First: <input id="firstName"></label>
    <label>Last: <input id="lastName"></label>
  </div>
  <div id="buttons">
    <span>Offline: <span id="offlineFlag">warming…</span></span>
    <button id="runBtn">Run ▶</button>
    <button id="submitBtn">Submit</button>
  </div>
</div>

<div id="container">
  <div id="editor"># Python example
print("Hello world!")</div>

  <div id="rightPane">
    <div id="console">
      <div id="consoleOutput"></div>
      <input id="consoleInput" placeholder="Type input here" disabled>
    </div>
  </div>

  <section id="questionPane">
    <header style="padding:6px 10px; background:#111; color:white;">
      <strong>Question:</strong>
      <span id="qStatus" style="opacity:.7; font-size:12px;"></span>
    </header>
    <iframe id="questionFrame" src="./questions/example_question.pdf" referrerpolicy="no-referrer"></iframe>
  </section>
</div>

<!-- Ace Editor -->
<script src="./ace/ace.js"></script>
<script src="./ace/mode-python.js"></script>
<script src="./ace/theme-textmate.js"></script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<script>
// ---------------------------
// IDE SETUP
// ---------------------------
const editor = ace.edit("editor");
editor.setTheme("ace/theme/textmate");
editor.session.setMode("ace/mode/python");
editor.setOptions({ fontSize:"16px", showPrintMargin:false, useSoftTabs:true, tabSize:4 });

// Console elements
const consoleOutput = document.getElementById("consoleOutput");
const consoleInput = document.getElementById("consoleInput");

// ---------------------------
// COPY/PASTE PREVENTION
// ---------------------------
let pasteCount = 0;
let events = 0;
let ranges = [];

function recordRange(startRowZeroBased, numLines){
  ranges.push({start:startRowZeroBased+1, end:startRowZeroBased+numLines});
  events++;
}

const aceInput = editor.textInput.getElement();
aceInput.addEventListener("keydown", e => {
  if((e.ctrlKey||e.metaKey)&&e.code==="KeyV"){ e.preventDefault(); pasteCount++; }
});
aceInput.addEventListener("paste", e => { e.preventDefault(); pasteCount++; });
aceInput.addEventListener("drop", e => e.preventDefault());

// ---------------------------
// PYODIDE SETUP
// ---------------------------
let pyReady = loadPyodide().then(py => { 
  document.getElementById("offlineFlag").textContent = "ready"; 
  return py;
});

// ---------------------------
// INPUT/OUTPUT HANDLING
// ---------------------------
async function pyInput(prompt=""){
  consoleOutput.textContent += prompt;
  consoleInput.disabled = false;
  consoleInput.focus();
  
  return new Promise(resolve => {
    const handler = e => {
      if(e.key==="Enter"){
        const val = consoleInput.value;
        consoleInput.value="";
        consoleInput.disabled=true;
        consoleInput.removeEventListener("keydown", handler);
        consoleOutput.textContent += val + "\n";
        resolve(val);
      }
    };
    consoleInput.addEventListener("keydown", handler);
  });
}

async function runCode(){
  consoleOutput.textContent = "";
  const code = editor.getValue();
  const py = await pyReady;
  
  // Override input() in Python
  await py.runPythonAsync(`
import builtins
import js
builtins.input = lambda prompt="": js.pyInput(prompt)
  `);
  
  try{
    await py.runPythonAsync(code);
  } catch(err){
    consoleOutput.textContent += "[error] " + err + "\n";
  }
}

// ---------------------------
// BUTTON HANDLERS
// ---------------------------
document.getElementById("runBtn").addEventListener("click", runCode);

document.getElementById("submitBtn").addEventListener("click", async ()=>{
  const first = document.getElementById("firstName").value.trim();
  const last  = document.getElementById("lastName").value.trim();
  if(!first||!last){ alert("Enter first and last name"); return; }
  
  const totalLines = editor.session.getDocument().getLength();
  let pCount=0; ranges.forEach(r=>pCount+=r.end-r.start+1);
  
  const body = new URLSearchParams({
    token:"SUBMIT_TOKEN_HERE",
    firstName:first,
    lastName:last,
    code:editor.getValue(),
    pLines: ranges.map(r=>r.start===r.end?r.start:`${r.start}–${r.end}`).join(","),
    pLineCount: pCount,
    events: events,
    pasteCount: pasteCount
  });
  
  try{
    const resp = await fetch("YOUR_GOOGLE_SCRIPT_URL", {method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"}, body, cache:"no-store"});
    if(!resp.ok) throw new Error(resp.status);
    alert("Submission sent!");
    events=0; ranges=[]; pasteCount=0;
  } catch(err){ alert("Error submitting code: "+err); }
});
</script>

</body>
</html>
