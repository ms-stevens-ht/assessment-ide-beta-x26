<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam‑Safe Python IDE</title>

<style>
:root {
  --bg:#1e1e1e;
  --panel:#2d2d2d;
  --accent:#007acc;
  --txt:#eaeaea;
  --out:#00ff99;
}

html, body {
  height:100%;
  margin:0;
  background:#1e1e1e;
  font-family:monospace;
  color:var(--txt);
}

#topbar {
  display:flex; justify-content:space-between; align-items:center;
  background:var(--panel); padding:6px 12px; font-size:14px;
}
#topbar input { width:80px; margin-left:4px; }

#container {
  display:grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  height: calc(100vh - 40px);
}

#editor { grid-column:1; grid-row:1 / span 2; width:100%; height:100%; }

#output {
  grid-column:2; grid-row:1; background:#0c0c0c; color:var(--out);
  padding:6px; overflow:auto; white-space:pre-wrap;
}

#questionPane {
  grid-column:2; grid-row:2; background:#0d0d0d; overflow:hidden; border-top:1px solid #333; display:flex; flex-direction:column;
}
#questionPane header { padding:6px 10px; background:#111; color:white; }
#questionPane iframe { flex:1; border:none; width:100%; }

button { cursor:pointer; }
input { color:#000; }
</style>
</head>
<body oncontextmenu="return false">

<div id="topbar">
  <div class="left">
    Exam IDE
    First: <input id="firstName">
    Last: <input id="lastName">
  </div>
  <div class="right">
    <span>Offline-ready: <span id="offlineFlag">warming…</span></span>
    <button id="runBtn">Run ▶</button>
    <button id="submitBtn">Submit</button>
  </div>
</div>

<div id="container">
  <div id="editor"># Python example
print("Hello world!")</div>

  <pre id="output"></pre>

  <section id="questionPane">
    <header>
      <strong>Question:</strong>
      <span id="qStatus" style="opacity:.7; font-size:12px;"></span>
    </header>
    <iframe id="questionFrame" src="./questions/example_question.pdf" referrerpolicy="no-referrer"></iframe>
  </section>
</div>

<!-- ACE Editor -->
<script src="./ace/ace.js"></script>
<script src="./ace/mode-python.js"></script>
<script src="./ace/theme-textmate.js"></script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<script>
// ACE Editor setup
const editor = ace.edit("editor");
editor.setTheme("ace/theme/textmate");
editor.session.setMode("ace/mode/python");
editor.setOptions({ fontSize:"16px", showPrintMargin:false, useSoftTabs:true, tabSize:4 });

// Console handling
const outputEl = document.getElementById("output");
function writeConsole(msg){ outputEl.textContent += msg; outputEl.scrollTop = outputEl.scrollHeight; }

// Pyodide setup
let pyReady = loadPyodide({
  stdout: msg => writeConsole(msg+"\n"),
  stderr: msg => writeConsole("[error] "+msg+"\n")
}).then(async py=>{
  document.getElementById("offlineFlag").textContent="ready";

  // Override input to work with console
  await py.runPythonAsync(`
import builtins, asyncio, js
def input(prompt=""):
    js.writeConsole(prompt)
    return asyncio.get_event_loop().run_until_complete(js.awaitInputJS())
builtins.input=input
  `);
  return py;
});

// Input queue for console
let inputResolve = null, inputQueue = [];
window.awaitInputJS = async function(){
  if(inputQueue.length>0) return inputQueue.shift();
  return new Promise(resolve => inputResolve=resolve);
};
outputEl.addEventListener("click", ()=>consoleInput.focus());
const consoleInput = document.createElement("input");
consoleInput.type="text"; consoleInput.placeholder="Type here...";
consoleInput.style.width="100%";
consoleInput.style.boxSizing="border-box";
outputEl.parentNode.insertBefore(consoleInput, outputEl.nextSibling);

consoleInput.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    const val = consoleInput.value + "\n";
    writeConsole(val);
    consoleInput.value="";
    if(inputResolve){ inputResolve(val.trim()); inputResolve=null; }
    else inputQueue.push(val.trim());
  }
});

// Run button
document.getElementById("runBtn").addEventListener("click", async()=>{
  const py = await pyReady;
  outputEl.textContent = "Running...\n\n";
  try { await py.runPythonAsync(editor.getValue()); }
  catch(err){ writeConsole("[error] "+err+"\n"); }
});

// Submit button placeholder
document.getElementById("submitBtn").addEventListener("click", ()=>alert("Submit clicked"));
</script>

</body>
</html>
